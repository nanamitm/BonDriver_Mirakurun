[GLOBAL]
SERVER_HOST="mirakurun.hogehoge.moe"
SERVER_PORT=40772

; B25(1=enable)
DECODE_B25=1

; Priority(0=Low Priority)
PRIORITY=0

; Service Split(1=enable)
SERVICE_SPLIT=0

; MagicPacket(1=enable)
MAGICPACKET_ENABLE=0
MAGICPACKET_TARGETMAC="00:00:00:00:00:00"
MAGICPACKET_TARGETIP="192.168.0.255"

; Mirakurunの/api/channelsや/api/servicesが返すtype名のうち、MMT/TLV(4K/8K)として
; 扱うものをカンマ区切りで指定(例: Mirakurun-BS4K https://github.com/tsuyopon123/Mirakurun-BS4K )。
; 一致したチャンネルはdecodeパラメータを常に0にし(サーバー側はMMT/TLVを復号できないため)、
; dantto4k(https://github.com/nekohkr/dantto4k)のコードをビルド時に取り込んでMPEG2-TSに
; 変換してから返す。x64ビルドのみ対応(Win32ビルドではこの機能は無効)。
MMT_TYPES=BS4K

[MMT4K]
; ACAS復号用スマートカードリーダー名(空の場合は既定のリーダーを使用)
SMARTCARD_READER_NAME=
; リモートCasProxyServerを使う場合は"host:port"を指定(空の場合はローカルのカードリーダーを使用)
; https://github.com/nekohkr/casproxyserver
CASPROXY_SERVER=
; 独自のwinscard.dllを使う場合のパス(空の場合は既定のものを使用)
CUSTOM_WINSCARD_DLL=